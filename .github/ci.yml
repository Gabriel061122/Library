name: Integración COntinua Java

on: 
  push:
    branches: [ "main" ]
    pull_request: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código del repositorio
      uses: actions/checkout@v4
    - name: 2. Configurar el entorno de Java (JDK 255)
      uses: actions/setup-java@v4
      with: 
        java-version: "25"
        distribution: "temurin"
    
    - name 3. Ejecutar las pruebas unitarias con Maven
      run: mvn test
      working-directory: ./